apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: azure-bucket-rgd.kro.run
spec:
  schema:
    apiVersion: v1alpha1
    kind: AzureBucket
    spec:
      resourceGroupName: string | required=true minLength=1
      location: string | default="westcentralus"
      storageAccountName: string | required=true pattern="^[a-z0-9]{3,24}$"
      containerName: string | required=true minLength=3
    status:
      url: '${"https://" + storageAccount.metadata.name + ".blob.core.windows.net/" + container.metadata.name}'

  resources:
    - id: resourceGroup
      template:
        apiVersion: resources.azure.com/v1api20200601
        kind: ResourceGroup
        metadata:
          name: ${schema.spec.resourceGroupName}
        spec:
          location: ${schema.spec.location}

    - id: storageAccount
      template:
        apiVersion: storage.azure.com/v1api20210401
        kind: StorageAccount
        metadata:
          name: ${schema.spec.storageAccountName}
        spec:
          location: ${schema.spec.location}
          kind: StorageV2
          sku:
            name: Standard_LRS
          owner:
            name: ${resourceGroup.metadata.name}
          accessTier: Hot

    - id: blobService
      template:
        apiVersion: storage.azure.com/v1api20210401
        kind: StorageAccountsBlobService
        metadata:
          name: ${schema.spec.storageAccountName}-blob
          annotations:
            serviceoperator.azure.com/reconcile-policy: detach-on-delete
        spec:
          owner:
            name: ${storageAccount.metadata.name}

    - id: container
      template:
        apiVersion: storage.azure.com/v1api20210401
        kind: StorageAccountsBlobServicesContainer
        metadata:
          name: ${schema.spec.containerName}
        spec:
          owner:
            name: ${blobService.metadata.name}
