apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: bucket-azure.platform.example.com
spec:
  schema:
    group: platform.example.com
    apiVersion: v1alpha1
    kind: Bucket
    spec:
      bucketName: string | required=true pattern="^[a-z0-9]{3,24}$" description="Used as Azure storageAccountName too"
      versioningEnabled: boolean | default=true description="Not used for Azure, kept for portability"
      lifecycleDays: integer | default=30 minimum=1 description="Not used for Azure, kept for portability"
    status:
      provider: ${"azure"}
      resourceGroup: ${resourceGroup.metadata.name}
      storageAccount: ${storageAccount.metadata.name}
      container: ${container.metadata.name}
      url: ${"https://%s.blob.core.windows.net/%s".format([storageAccount.metadata.name, container.metadata.name])}

  resources:
    - id: platformConfig
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: bucket-platform-config
          namespace: platform-system

    - id: resourceGroup
      template:
        apiVersion: resources.azure.com/v1api20200601
        kind: ResourceGroup
        metadata:
          name: ${schema.spec.bucketName}-rg
          namespace: ${schema.metadata.namespace}
        spec:
          location: ${platformConfig.data.?AZURE_LOCATION.orValue("westcentralus")}

    - id: storageAccount
      template:
        apiVersion: storage.azure.com/v1api20210401
        kind: StorageAccount
        metadata:
          name: ${schema.spec.bucketName}
          namespace: ${schema.metadata.namespace}
        spec:
          location: ${platformConfig.data.?AZURE_LOCATION.orValue("westcentralus")}
          kind: StorageV2
          sku:
            name: Standard_LRS
          owner:
            name: ${resourceGroup.metadata.name}
          accessTier: Hot

    - id: blobService
      template:
        apiVersion: storage.azure.com/v1api20210401
        kind: StorageAccountsBlobService
        metadata:
          name: ${schema.spec.bucketName}-blob
          namespace: ${schema.metadata.namespace}
          annotations:
            serviceoperator.azure.com/reconcile-policy: detach-on-delete
        spec:
          owner:
            name: ${storageAccount.metadata.name}

    - id: container
      template:
        apiVersion: storage.azure.com/v1api20210401
        kind: StorageAccountsBlobServicesContainer
        metadata:
          name: ${schema.spec.bucketName}
          namespace: ${schema.metadata.namespace}
        spec:
          owner:
            name: ${blobService.metadata.name}
