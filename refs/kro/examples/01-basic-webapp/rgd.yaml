apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: webapp-basic.kro.run
spec:
  schema:
    apiVersion: v1alpha1
    kind: WebApp
    spec:
      name: string | required=true description="Application name"
      image: string | default="nginx:1.27" description="Container image"
      replicas: integer | default=2 minimum=1 maximum=10
      port: integer | default=80 minimum=1 maximum=65535
    status:
      availableReplicas: ${deployment.status.availableReplicas}
      serviceName: ${service.metadata.name}
      clusterIP: ${service.spec.clusterIP}
      url: '${"http://" + service.metadata.name + "." + service.metadata.namespace + ".svc.cluster.local:" + string(service.spec.ports[0].port)}'

  resources:
    - id: deployment
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ${schema.spec.name}
          labels:
            app.kubernetes.io/name: ${schema.spec.name}
        spec:
          replicas: ${schema.spec.replicas}
          selector:
            matchLabels:
              app.kubernetes.io/name: ${schema.spec.name}
          template:
            metadata:
              labels:
                app.kubernetes.io/name: ${schema.spec.name}
            spec:
              containers:
                - name: app
                  image: ${schema.spec.image}
                  ports:
                    - name: http
                      containerPort: ${schema.spec.port}
                  env:
                    - name: APP_NAME
                      value: ${schema.spec.name}

    - id: service
      template:
        apiVersion: v1
        kind: Service
        metadata:
          name: ${schema.spec.name}-svc
          labels:
            app.kubernetes.io/name: ${schema.spec.name}
        spec:
          selector: ${deployment.spec.selector.matchLabels}
          ports:
            - name: http
              protocol: TCP
              port: ${schema.spec.port}
              targetPort: ${schema.spec.port}
