apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: postgres-backed-app.kro.run
spec:
  schema:
    apiVersion: v1alpha1
    kind: PostgresBackedApp
    spec:
      name: string | required=true
      image: string | default="busybox:1.36"
      replicas: integer | default=1 minimum=1 maximum=10
      db:
        user: string | default="postgres"
        password: string | default="changeme" description="Demo only. Prefer external secrets in production."
        database: string | default="app"
        port: integer | default=5432 minimum=1 maximum=65535
        image: string | default="postgres:15"
    status:
      dbServiceName: ${dbService.metadata.name}
      dbSecretName: ${dbSecret.metadata.name}
      dbReadyReplicas: ${dbStatefulSet.?status.?readyReplicas.orValue(0)}
      connectionString: '${"postgresql://" + dbStatefulSet.spec.template.spec.containers[0].env.filter(e, e.name == "POSTGRES_USER")[0].value + "@" + dbService.metadata.name + "." + dbService.metadata.namespace + ".svc.cluster.local:" + string(dbService.spec.ports[0].port) + "/" + dbStatefulSet.spec.template.spec.containers[0].env.filter(e, e.name == "POSTGRES_DB")[0].value}'
      appReadyReplicas: ${appDeployment.status.?readyReplicas.orValue(0)}

  resources:
    - id: dbSecret
      template:
        apiVersion: v1
        kind: Secret
        metadata:
          name: ${schema.spec.name}-db
        type: Opaque
        stringData:
          password: ${schema.spec.db.password}

    - id: dbService
      template:
        apiVersion: v1
        kind: Service
        metadata:
          name: ${schema.spec.name}-db
        spec:
          ports:
            - name: postgres
              port: ${schema.spec.db.port}
              targetPort: postgres
          selector:
            app.kubernetes.io/name: ${schema.spec.name}-db

    - id: dbStatefulSet
      template:
        apiVersion: apps/v1
        kind: StatefulSet
        metadata:
          name: ${schema.spec.name}-db
          labels:
            app.kubernetes.io/name: ${schema.spec.name}-db
        spec:
          serviceName: ${dbService.metadata.name}
          replicas: 1
          selector:
            matchLabels:
              app.kubernetes.io/name: ${schema.spec.name}-db
          template:
            metadata:
              labels:
                app.kubernetes.io/name: ${schema.spec.name}-db
            spec:
              containers:
                - name: postgres
                  image: ${schema.spec.db.image}
                  ports:
                    - name: postgres
                      containerPort: 5432
                  env:
                    - name: POSTGRES_USER
                      value: ${schema.spec.db.user}
                    - name: POSTGRES_PASSWORD
                      valueFrom:
                        secretKeyRef:
                          name: ${dbSecret.metadata.name}
                          key: password
                    - name: POSTGRES_DB
                      value: ${schema.spec.db.database}
                  volumeMounts:
                    - name: data
                      mountPath: /var/lib/postgresql/data
              volumes:
                - name: data
                  emptyDir: {}
      readyWhen:
        - ${dbStatefulSet.?status.?readyReplicas.orValue(0) == 1}

    - id: appDeployment
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ${schema.spec.name}-app
          labels:
            app.kubernetes.io/name: ${schema.spec.name}-app
        spec:
          replicas: ${schema.spec.replicas}
          selector:
            matchLabels:
              app.kubernetes.io/name: ${schema.spec.name}-app
          template:
            metadata:
              labels:
                app.kubernetes.io/name: ${schema.spec.name}-app
            spec:
              containers:
                - name: app
                  image: ${schema.spec.image}
                  command:
                    - sh
                    - -c
                    - |
                      echo "DB_HOST=$DB_HOST" && \
                      echo "DB_PORT=$DB_PORT" && \
                      echo "DB_USER=$DB_USER" && \
                      echo "DB_NAME=$DB_NAME" && \
                      echo "DB_READY_REPLICAS=$DB_READY_REPLICAS" && \
                      sleep 3600
                  env:
                    - name: DB_HOST
                      value: ${dbService.metadata.name}
                    - name: DB_PORT
                      value: ${string(schema.spec.db.port)}
                    - name: DB_USER
                      value: ${schema.spec.db.user}
                    - name: DB_NAME
                      value: ${schema.spec.db.database}
                    - name: DB_PASSWORD
                      valueFrom:
                        secretKeyRef:
                          name: ${dbSecret.metadata.name}
                          key: password
                    - name: DB_READY_REPLICAS
                      value: ${string(dbStatefulSet.?status.?readyReplicas.orValue(0))}
