apiVersion: clusterctl.cluster.x-k8s.io/v1alpha3
kind: Metadata
# Release series declare which controller contract a given minor line ships.
# kany8s v0.1.x ships with Cluster API v1beta2 because cmd/main.go imports
# sigs.k8s.io/cluster-api/api/core/v1beta2 (CAPI v1.12+).
# When cutting v0.2.x prepend another entry with the new contract; clusterctl
# requires descending order by (major, minor).
releaseSeries:
- major: 0
  minor: 1
  contract: v1beta2
