apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: ready-endpoint-contract
spec:
  schema:
    apiVersion: v1alpha1
    kind: ReadyEndpointContract
    spec:
      image: string | default="nginx:1.27"
      replicas: integer | default=1 minimum=1 maximum=10
      port: integer | default=80 minimum=1 maximum=65535
    status:
      # NOTE: kro v0.7.1 sometimes drops boolean status fields unless the
      # expression includes an explicit cast (see docs/issues.md).
      ready: ${int(deployment.?status.?availableReplicas.orValue(0)) == 1}
      endpoint: '${service.metadata.name + "." + service.metadata.namespace + ".svc.cluster.local:" + string(service.spec.ports[0].port)}'

  resources:
    - id: deployment
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ${schema.metadata.name}
          labels:
            app.kubernetes.io/name: ${schema.metadata.name}
        spec:
          replicas: ${schema.spec.replicas}
          selector:
            matchLabels:
              app.kubernetes.io/name: ${schema.metadata.name}
          template:
            metadata:
              labels:
                app.kubernetes.io/name: ${schema.metadata.name}
            spec:
              containers:
                - name: app
                  image: ${schema.spec.image}
                  ports:
                    - name: http
                      containerPort: ${schema.spec.port}
      readyWhen:
        - ${int(deployment.?status.?availableReplicas.orValue(0)) == 1}

    - id: service
      template:
        apiVersion: v1
        kind: Service
        metadata:
          name: ${schema.metadata.name}
          labels:
            app.kubernetes.io/name: ${schema.metadata.name}
        spec:
          selector: ${deployment.spec.selector.matchLabels}
          ports:
            - name: http
              protocol: TCP
              port: ${schema.spec.port}
              targetPort: ${schema.spec.port}
