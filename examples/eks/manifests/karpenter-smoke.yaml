apiVersion: apps/v1
kind: Deployment
metadata:
  name: karpenter-smoke
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: karpenter-smoke
  template:
    metadata:
      labels:
        app: karpenter-smoke
    spec:
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
