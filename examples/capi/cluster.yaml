apiVersion: cluster.x-k8s.io/v1beta2
kind: Cluster
metadata:
  name: demo-cluster
  namespace: default
spec:
  # Kany8sCluster is a minimal InfrastructureCluster provider.
  # In kro mode, it provisions infra via an RGD (see examples/kro/infra/rgd.yaml).
  infrastructureRef:
    apiGroup: infrastructure.cluster.x-k8s.io
    kind: Kany8sCluster
    name: demo-cluster
  controlPlaneRef:
    apiGroup: controlplane.cluster.x-k8s.io
    kind: Kany8sControlPlane
    name: demo-cluster
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: Kany8sCluster
metadata:
  name: demo-cluster
  namespace: default
spec:
  resourceGraphDefinitionRef:
    name: demo-infra.kro.run
---
apiVersion: controlplane.cluster.x-k8s.io/v1alpha1
kind: Kany8sControlPlane
metadata:
  name: demo-cluster
  namespace: default
spec:
  version: "1.34"
  resourceGraphDefinitionRef:
    name: demo-control-plane.kro.run
  kroSpec:
    # Demo RGD requires `spec.name`.
    name: demo-cluster
