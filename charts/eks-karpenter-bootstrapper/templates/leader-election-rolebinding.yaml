{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "eks-karpenter-bootstrapper.fullname" . }}-leader-election
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "eks-karpenter-bootstrapper.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "eks-karpenter-bootstrapper.fullname" . }}-leader-election
subjects:
  - kind: ServiceAccount
    name: {{ include "eks-karpenter-bootstrapper.serviceAccountName" . }}
    namespace: {{ .Values.namespace }}
{{- end }}
