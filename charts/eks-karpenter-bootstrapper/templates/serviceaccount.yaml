{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "eks-karpenter-bootstrapper.serviceAccountName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "eks-karpenter-bootstrapper.labels" . | nindent 4 }}
  {{- $ann := deepCopy (default (dict) .Values.serviceAccount.annotations) }}
  {{- if eq .Values.aws.mode "irsa" }}
    {{- $_ := set $ann "eks.amazonaws.com/role-arn" (required "aws.irsa.roleArn is required when aws.mode=irsa" .Values.aws.irsa.roleArn) }}
  {{- end }}
  {{- if $ann }}
  annotations:
    {{- toYaml $ann | nindent 4 }}
  {{- end }}
{{- end }}
