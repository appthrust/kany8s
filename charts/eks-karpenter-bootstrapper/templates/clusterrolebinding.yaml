{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: eks-karpenter-bootstrapper
  labels:
    {{- include "eks-karpenter-bootstrapper.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: eks-karpenter-bootstrapper
subjects:
  - kind: ServiceAccount
    name: {{ include "eks-karpenter-bootstrapper.serviceAccountName" . }}
    namespace: {{ .Values.namespace }}
{{- end }}
