{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "eks-kubeconfig-rotator.fullname" . }}-leader-election
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "eks-kubeconfig-rotator.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - create
      - get
      - list
      - patch
      - update
      - watch
{{- end }}
