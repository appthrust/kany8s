apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "eks-kubeconfig-rotator.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "eks-kubeconfig-rotator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "eks-kubeconfig-rotator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "eks-kubeconfig-rotator.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "eks-kubeconfig-rotator.serviceAccountName" . }}
      {{- include "eks-kubeconfig-rotator.imagePullSecrets" . | nindent 6 }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      containers:
        - name: manager
          image: {{ include "eks-kubeconfig-rotator.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /eks-kubeconfig-rotator
          args:
            {{- include "eks-kubeconfig-rotator.args" . | nindent 12 }}
          env:
            {{- if .Values.aws.region }}
            - name: AWS_REGION
              value: {{ .Values.aws.region | quote }}
            - name: AWS_DEFAULT_REGION
              value: {{ .Values.aws.region | quote }}
            {{- end }}
            {{- if .Values.aws.credentials.secretName }}
            - name: AWS_SHARED_CREDENTIALS_FILE
              value: {{ include "eks-kubeconfig-rotator.aws.credentials.filePath" . | quote }}
            - name: AWS_PROFILE
              value: {{ .Values.aws.credentials.profile | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.aws.credentials.secretName }}
          volumeMounts:
            - name: {{ .Values.aws.credentials.secretName }}
              mountPath: {{ include "eks-kubeconfig-rotator.aws.credentials.secretMountPath" . }}
              readOnly: true
          {{- end }}
      {{- if .Values.aws.credentials.secretName }}
      volumes:
        - name: {{ .Values.aws.credentials.secretName }}
          secret:
            secretName: {{ .Values.aws.credentials.secretName }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
