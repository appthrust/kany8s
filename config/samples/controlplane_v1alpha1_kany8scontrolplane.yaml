apiVersion: controlplane.cluster.x-k8s.io/v1alpha1
kind: Kany8sControlPlane
metadata:
  labels:
    app.kubernetes.io/name: kany8s
    app.kubernetes.io/managed-by: kustomize
  name: demo-cluster
spec:
  # Exactly one backend selector must be set.
  version: "1.34"
  resourceGraphDefinitionRef:
    # kro backend example:
    # Apply `examples/kro/ready-endpoint/rgd.yaml` first.
    name: demo-control-plane.kro.run
  kroSpec:
    # Demo RGD requires `spec.name`.
    name: demo-cluster

