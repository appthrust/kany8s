apiVersion: apps/v1
kind: Deployment
metadata:
  name: eks-kubeconfig-rotator
  namespace: ack-system
  labels:
    app.kubernetes.io/name: eks-kubeconfig-rotator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: eks-kubeconfig-rotator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: eks-kubeconfig-rotator
    spec:
      serviceAccountName: eks-kubeconfig-rotator
      containers:
        - name: manager
          image: example.com/eks-kubeconfig-rotator:latest
          imagePullPolicy: IfNotPresent
          command:
            - /eks-kubeconfig-rotator
          args:
            - --leader-elect
            - --metrics-bind-address=0
            - --metrics-secure=false
            - --health-probe-bind-address=:8081
            - --refresh-before=5m
            - --max-refresh-interval=10m
            - --failure-backoff=30s
          env:
            - name: AWS_SHARED_CREDENTIALS_FILE
              value: /aws/credentials
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: aws-creds
              mountPath: /aws
              readOnly: true
      volumes:
        - name: aws-creds
          secret:
            secretName: aws-creds
            optional: true
