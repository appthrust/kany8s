---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - controlplane.cluster.x-k8s.io
  resources:
  - kany8scontrolplanes
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - controlplane.cluster.x-k8s.io
  resources:
  - kany8scontrolplanes/finalizers
  verbs:
  - update
- apiGroups:
  - kro.run
  resources:
  - '*'
  verbs:
  - create
  - get
  - update
- apiGroups:
  - kro.run
  resources:
  - resourcegraphdefinitions
  verbs:
  - get
  - list
  - watch
