# This rule is not used by the project kany8s itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the controlplane.cluster.x-k8s.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: kany8s
    app.kubernetes.io/managed-by: kustomize
  name: kany8scontrolplanetemplate-editor-role
rules:
- apiGroups:
  - controlplane.cluster.x-k8s.io
  resources:
  - kany8scontrolplanetemplates
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - controlplane.cluster.x-k8s.io
  resources:
  - kany8scontrolplanetemplates/status
  verbs:
  - get
