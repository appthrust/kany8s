apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Each clusterctl provider lives in its own namespace so that the
# infrastructure and control-plane Deployments (which each run the same binary
# with --enable-controller pinned to a single group) do not clash on names or
# ClusterRoleBinding references.
namespace: infrastructure-kany8s-system
namePrefix: infrastructure-kany8s-

resources:
- ../../clusterapi/infrastructure
- rbac
- ../../manager

commonLabels:
  cluster.x-k8s.io/provider: infrastructure-kany8s
  cluster.x-k8s.io/v1beta1: v1beta1
  cluster.x-k8s.io/v1beta2: v1beta2

patches:
- path: ../../manager/infrastructure-args-patch.yaml
  target:
    kind: Deployment
    name: controller-manager
