apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: control-plane-kany8s-system
namePrefix: control-plane-kany8s-

resources:
- ../../clusterapi/controlplane
- rbac
- ../../manager
- ../../webhook
- ../../certmanager

commonLabels:
  cluster.x-k8s.io/provider: control-plane-kany8s
  cluster.x-k8s.io/v1beta1: v1beta1
  cluster.x-k8s.io/v1beta2: v1beta2

configurations:
- ../../default/kustomizeconfig.yaml

patches:
- path: ../../manager/controlplane-args-patch.yaml
  target:
    kind: Deployment
    name: controller-manager

# Re-point the admission webhook Certificate dnsNames to the prefixed
# webhook-service / namespace, and inject the CA into the ValidatingWebhook
# annotations, the same way config/default does for single-binary installs.
replacements:
  - source:
      kind: Service
      version: v1
      name: webhook-service
      fieldPath: .metadata.name
    targets:
      - select:
          kind: Certificate
          group: cert-manager.io
          version: v1
          name: serving-cert
        fieldPaths:
          - .spec.dnsNames.0
          - .spec.dnsNames.1
        options:
          delimiter: '.'
          index: 0
          create: true
  - source:
      kind: Service
      version: v1
      name: webhook-service
      fieldPath: .metadata.namespace
    targets:
      - select:
          kind: Certificate
          group: cert-manager.io
          version: v1
          name: serving-cert
        fieldPaths:
          - .spec.dnsNames.0
          - .spec.dnsNames.1
        options:
          delimiter: '.'
          index: 1
          create: true
  - source:
      kind: Certificate
      group: cert-manager.io
      version: v1
      name: serving-cert
      fieldPath: .metadata.namespace
    targets:
      - select:
          kind: ValidatingWebhookConfiguration
        fieldPaths:
          - .metadata.annotations.[cert-manager.io/inject-ca-from]
        options:
          delimiter: '/'
          index: 0
          create: true
  - source:
      kind: Certificate
      group: cert-manager.io
      version: v1
      name: serving-cert
      fieldPath: .metadata.name
    targets:
      - select:
          kind: ValidatingWebhookConfiguration
        fieldPaths:
          - .metadata.annotations.[cert-manager.io/inject-ca-from]
        options:
          delimiter: '/'
          index: 1
          create: true
