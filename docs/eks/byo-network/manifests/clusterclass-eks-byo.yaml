apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: Kany8sClusterTemplate
metadata:
  name: kany8s-aws-byo-network
spec:
  template:
    spec:
      resourceGraphDefinitionRef:
        name: aws-byo-network.kro.run
      # Pre-create nested objects so JSON patches for /kroSpec/vpc/* are safe.
      kroSpec:
        vpc: {}
---
apiVersion: controlplane.cluster.x-k8s.io/v1alpha1
kind: Kany8sControlPlaneTemplate
metadata:
  name: kany8s-eks-byo
spec:
  template:
    spec:
      resourceGraphDefinitionRef:
        name: eks-control-plane-byo.kro.run
      # Pre-create nested objects so JSON patches for /kroSpec/vpc/* are safe.
      kroSpec:
        vpc: {}
---
apiVersion: cluster.x-k8s.io/v1beta2
kind: ClusterClass
metadata:
  name: kany8s-eks-byo
spec:
  infrastructure:
    templateRef:
      apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
      kind: Kany8sClusterTemplate
      name: kany8s-aws-byo-network
  controlPlane:
    templateRef:
      apiVersion: controlplane.cluster.x-k8s.io/v1alpha1
      kind: Kany8sControlPlaneTemplate
      name: kany8s-eks-byo
  variables:
    - name: region
      required: true
      schema:
        openAPIV3Schema:
          type: string
          minLength: 1
    - name: eks-version
      required: true
      schema:
        openAPIV3Schema:
          type: string
          minLength: 1
    - name: vpc-subnet-ids
      required: true
      schema:
        openAPIV3Schema:
          type: array
          minItems: 2
          uniqueItems: true
          items:
            type: string
            minLength: 1
    - name: vpc-security-group-ids
      required: true
      schema:
        openAPIV3Schema:
          type: array
          uniqueItems: true
          items:
            type: string
            minLength: 1
    - name: eks-public-access-cidrs
      required: true
      schema:
        openAPIV3Schema:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            minLength: 1
  patches:
    - name: kany8sInfraKroSpec
      definitions:
        - selector:
            apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
            kind: Kany8sClusterTemplate
            matchResources:
              infrastructureCluster: true
          jsonPatches:
            - op: add
              path: /spec/template/spec/kroSpec/vpc/subnetIDs
              valueFrom:
                variable: vpc-subnet-ids
            - op: add
              path: /spec/template/spec/kroSpec/vpc/securityGroupIDs
              valueFrom:
                variable: vpc-security-group-ids
    - name: kany8sControlPlaneKroSpec
      definitions:
        - selector:
            apiVersion: controlplane.cluster.x-k8s.io/v1alpha1
            kind: Kany8sControlPlaneTemplate
            matchResources:
              controlPlane: true
          jsonPatches:
            - op: add
              path: /spec/template/spec/kroSpec/region
              valueFrom:
                variable: region
            - op: add
              path: /spec/template/spec/kroSpec/eksVersion
              valueFrom:
                variable: eks-version
            - op: add
              path: /spec/template/spec/kroSpec/vpc/subnetIDs
              valueFrom:
                variable: vpc-subnet-ids
            - op: add
              path: /spec/template/spec/kroSpec/vpc/securityGroupIDs
              valueFrom:
                variable: vpc-security-group-ids
            - op: add
              path: /spec/template/spec/kroSpec/publicAccessCIDRs
              valueFrom:
                variable: eks-public-access-cidrs
