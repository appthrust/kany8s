apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: Kany8sClusterTemplate
metadata:
  name: kany8s-aws-byo-network
spec:
  template:
    spec:
      resourceGraphDefinitionRef:
        name: aws-byo-network.kro.run
      # Pre-create nested objects so JSON patches for /kroSpec/vpc/* are safe.
      kroSpec:
        vpc: {}
---
apiVersion: controlplane.cluster.x-k8s.io/v1alpha1
kind: Kany8sControlPlaneTemplate
metadata:
  name: kany8s-eks-byo
spec:
  template:
    spec:
      resourceGraphDefinitionRef:
        name: eks-control-plane-byo.kro.run
      # Pre-create nested objects so JSON patches for /kroSpec/{vpc,access}/* are safe.
      kroSpec:
        vpc: {}
        access: {}
---
apiVersion: cluster.x-k8s.io/v1beta2
kind: ClusterClass
metadata:
  name: kany8s-eks-byo
spec:
  infrastructure:
    naming:
      template: "{{ .cluster.name }}"
    templateRef:
      apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
      kind: Kany8sClusterTemplate
      name: kany8s-aws-byo-network
  controlPlane:
    naming:
      template: "{{ .cluster.name }}"
    templateRef:
      apiVersion: controlplane.cluster.x-k8s.io/v1alpha1
      kind: Kany8sControlPlaneTemplate
      name: kany8s-eks-byo
  variables:
    - name: region
      required: true
      schema:
        openAPIV3Schema:
          type: string
          minLength: 1
    - name: eks-version
      required: true
      schema:
        openAPIV3Schema:
          type: string
          minLength: 1
    - name: vpc-control-plane-subnet-ids
      required: true
      schema:
        openAPIV3Schema:
          type: array
          minItems: 2
          uniqueItems: true
          items:
            type: string
            minLength: 1
          description: |
            Subnet IDs that back the EKS control plane ENIs
            (Cluster.resourcesVPCConfig.subnetIDs). Must span >=2 AZs.
            NAT egress is NOT required here (control plane ENIs do not
            originate outbound traffic). Class choice depends on endpoint
            access mode: private when endpointPrivateAccess=true, public
            or private when using public-only endpoint.
    - name: vpc-node-subnet-ids
      required: true
      schema:
        openAPIV3Schema:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            minLength: 1
          description: |
            Subnet IDs that back the karpenter Fargate profile and the
            default EC2NodeClass subnetSelectorTerms. Must be private
            subnets (AWS FargateProfile rejects public subnets); image
            pulls require outbound egress, which can be provided by a
            NAT default route or by VPC endpoints (ecr.api, ecr.dkr,
            s3, sts, logs). The controller treats missing NAT default
            route as a warning, not a hard failure. >=2 across >=2 AZs
            is recommended for HA but not required (AWS FargateProfile
            accepts >=1 subnet); the controller emits a warning event
            when AZ count < 2.
    - name: vpc-security-group-ids
      required: true
      schema:
        openAPIV3Schema:
          type: array
          uniqueItems: true
          items:
            type: string
            minLength: 1
    - name: vpc-node-security-group-ids
      required: false
      schema:
        openAPIV3Schema:
          type: array
          uniqueItems: true
          items:
            type: string
            minLength: 1
    - name: karpenter-node-role-additional-policy-arns
      required: false
      schema:
        openAPIV3Schema:
          type: array
          uniqueItems: true
          items:
            type: string
            minLength: 1
    - name: eks-public-access-cidrs
      required: true
      schema:
        openAPIV3Schema:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            minLength: 1
    - name: eks-access-mode
      required: false
      schema:
        openAPIV3Schema:
          type: string
          minLength: 1
          default: API_AND_CONFIG_MAP
    - name: eks-endpoint-private-access
      required: false
      schema:
        openAPIV3Schema:
          type: boolean
          default: true
    - name: eks-endpoint-public-access
      required: false
      schema:
        openAPIV3Schema:
          type: boolean
          default: true
  patches:
    - name: kany8sInfraKroSpec
      definitions:
        - selector:
            apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
            kind: Kany8sClusterTemplate
            matchResources:
              infrastructureCluster: true
          jsonPatches:
            - op: add
              path: /spec/template/spec/kroSpec/vpc/subnetIDs
              valueFrom:
                # Decorative readiness gate: aws-byo-network-rgd.yaml
                # marks the infra inputs ready when size(...) >= 2. Feed
                # the control plane subnet list (minItems=2 by schema) so
                # the gate is always satisfiable; vpc-node-subnet-ids is
                # minItems=1 (AWS FargateProfile accepts >=1 subnet) and
                # would stall the gate when a single-AZ node layout is
                # used.
                variable: vpc-control-plane-subnet-ids
            - op: add
              path: /spec/template/spec/kroSpec/vpc/securityGroupIDs
              valueFrom:
                variable: vpc-security-group-ids
    - name: kany8sControlPlaneKroSpec
      definitions:
        - selector:
            apiVersion: controlplane.cluster.x-k8s.io/v1alpha1
            kind: Kany8sControlPlaneTemplate
            matchResources:
              controlPlane: true
          jsonPatches:
            - op: add
              path: /spec/template/spec/kroSpec/region
              valueFrom:
                variable: region
            - op: add
              path: /spec/template/spec/kroSpec/eksVersion
              valueFrom:
                variable: eks-version
            - op: add
              path: /spec/template/spec/kroSpec/vpc/subnetIDs
              valueFrom:
                # Backs the EKS resourcesVPCConfig.subnetIDs (control
                # plane ENI placement).
                variable: vpc-control-plane-subnet-ids
            - op: add
              path: /spec/template/spec/kroSpec/vpc/securityGroupIDs
              valueFrom:
                variable: vpc-security-group-ids
            - op: add
              path: /spec/template/spec/kroSpec/publicAccessCIDRs
              valueFrom:
                variable: eks-public-access-cidrs
            - op: add
              path: /spec/template/spec/kroSpec/access/authenticationMode
              valueFrom:
                variable: eks-access-mode
            - op: add
              path: /spec/template/spec/kroSpec/vpc/endpointPrivateAccess
              valueFrom:
                variable: eks-endpoint-private-access
            - op: add
              path: /spec/template/spec/kroSpec/vpc/endpointPublicAccess
              valueFrom:
                variable: eks-endpoint-public-access
