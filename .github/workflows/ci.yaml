name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    name: Unit + Manifests
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: make test

      - name: Generate manifests
        run: make manifests

      - name: Verify working tree clean
        run: git diff --exit-code
